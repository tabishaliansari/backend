{% extends "email/base.html" %}

{% block body %}
<div class="greeting">
    Hi {{ username }},
</div>

<div class="intro">
    {{ intro }}
</div>

<div class="action">
    <span class="action-instructions">{{ action_instructions }}</span>
    <a href="{{ action_button_url }}" class="action-button" style="--action-btn-bg: {{ action_button_color | default('#1a73e8', true) }};">
        {{ action_button_text }}
    </a>
</div>

<div class="outro">
    {{ outro }}
</div>

<div class="signature">
    Best regards,<br/>
    <strong>The GraphLM Team</strong>
</div>
{% endblock %}
